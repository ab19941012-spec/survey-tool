        .no-scrollbar::-webkit-scrollbar { display: none; }

        .qty-control { background: rgba(255,255,255,0.1); border-radius: 14px; padding: 4px; display: flex; align-items: center; }

        .qty-btn:active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 10px; }
        .qty-input { background: transparent; width: 65px; text-align: center; font-size: 18px; font-weight: 900; color: #fff; border: none; outline: none; }

        #capture-area {

            position: absolute; left: -9999px; top: 0;

        .report-table th { background: #f2f2f2; padding: 12px; border: 1.5px solid #000; font-size: 11pt; text-align: left; }
        .report-table td { padding: 10px; border: 1px solid #000; font-size: 10.5pt; line-height: 1.4; }

            {cat:"邊坡保護工程", name:"25T 消波塊", price:52000, unit:"個"},
            {cat:"邊坡保護工程", name:"混凝土護塊 (1.5x1.5)", price:10000, unit:"個"},
            {cat:"邊坡保護工程", name:"撒草籽(覆稻草蓆)", price:100, unit:"m²"},
            {cat:"邊坡保護工程", name:"地表裂縫填補", price:1000, unit:"m"},
            {cat:"邊坡保護工程", name:"打樁編柵", price:800, unit:"m²"},
            {cat:"邊坡保護工程", name:"掛網噴植(厚 5cm)", price:800, unit:"m²"},
            {cat:"邊坡保護工程", name:"掛網噴凝土(厚 10cm)", price:2200, unit:"m²"},
            {cat:"邊坡保護工程", name:"鋪網噴凝土溝", price:2600, unit:"m"},
            {cat:"邊坡保護工程", name:"混凝土拍漿溝", price:5000, unit:"m"},
            {cat:"邊坡保護工程", name:"自由梁框掛網噴植", price:4000, unit:"m²"},
            {cat:"邊坡保護工程", name:"型框邊坡噴植", price:5000, unit:"m²"},
            {cat:"邊坡保護工程", name:"阻絕式防落石柵(H150)", price:12000, unit:"m"},
            {cat:"邊坡保護工程", name:"岩釘鑽孔灌漿", price:4000, unit:"支"},
            {cat:"邊坡保護工程", name:"打設橫向集水管", price:3600, unit:"m"}
        ];

        let basket = [];
        let curCat = "全部";

        function init() {
            document.getElementById('disclaimer-txt').innerText = LEGAL;
            document.getElementById('p-legal').innerText = LEGAL;
            
            const nav = document.getElementById('cat-nav');
            CATEGORIES.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "px-5 py-2 rounded-full text-[11px] font-black glass text-white/30 transition-all whitespace-nowrap";
                btn.innerText = c;
                if(c === "全部") btn.classList.add('active-tab');
                btn.onclick = () => {
                    curCat = c;
                    document.querySelectorAll('#cat-nav button').forEach(x => x.classList.remove('active-tab'));
                    btn.classList.add('active-tab');
                    render();
                };
                nav.appendChild(btn);
            });

            document.getElementById('search').oninput = render;
            document.getElementById('island-summary').onclick = () => document.getElementById('island-drawer').classList.toggle('hidden');
            render();
        }

        function render() {
            const list = document.getElementById('item-list');
            const kw = document.getElementById('search').value.toLowerCase();
            list.innerHTML = '';

            DB.filter(i => (curCat === "全部" || i.cat === curCat) && i.name.toLowerCase().includes(kw)).forEach(i => {
                const div = document.createElement('div');
                div.className = 'glass rounded-[2rem] p-5 flex justify-between items-center active:scale-95 transition-all';
                div.onclick = () => {
                    const ex = basket.find(b => b.name === i.name);
                    if(ex) ex.qty++; else basket.push({...i, qty: 1});
                    update();
                };
                div.innerHTML = `
                    <div class="flex-1 mr-4">
                        <div class="text-[9px] font-black text-red-500 uppercase tracking-widest mb-1 underline decoration-red-500/20 underline-offset-4">${i.cat}</div>
                        <h3 class="text-lg font-bold leading-tight">${i.name}</h3>
                        <div class="flex gap-6 mt-2">
                            <div><p class="text-[9px] text-white/30 font-bold uppercase">基準單價</p><p class="text-md font-mono font-bold">$${i.price.toLocaleString()}</p></div>
                            <div><p class="text-[9px] text-white/30 font-bold uppercase">偏遠(+30%)</p><p class="text-md font-mono font-bold text-red-500">$${Math.round(i.price*1.3).toLocaleString()}</p></div>
                        </div>
                    </div>
                    <div class="h-10 w-10 rounded-full bg-white/5 flex items-center justify-center text-white/20"><i class="fa-solid fa-plus text-sm"></i></div>
                `;
                list.appendChild(div);
            });
        }

        function update() {
            const bt = basket.reduce((s, i) => s + (i.price * i.qty), 0);
            const rt = Math.round(bt * 1.3);
            document.getElementById('sum-base').innerText = `$${bt.toLocaleString()}`;
            document.getElementById('sum-remote').innerText = `$${rt.toLocaleString()}`;
            document.getElementById('count-tag').innerText = basket.length;

            const list = document.getElementById('basket-list');
            const rows = document.getElementById('r-rows');
            list.innerHTML = ''; rows.innerHTML = '';

            basket.forEach((i, idx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'flex justify-between items-center p-5 bg-white/5 rounded-[2.2rem] border border-white/5';
                itemDiv.innerHTML = `
                    <div class="flex-1 pr-4">
                        <p class="text-sm font-bold text-white/90 leading-tight">${i.name}</p>
                        <p class="text-[10px] text-white/20 font-mono italic mt-1">$${i.price.toLocaleString()} / ${i.unit}</p>
                    </div>
                    <div class="qty-control">
                        <button onclick="changeQty(${idx}, -1)" class="qty-btn"><i class="fa-solid fa-minus text-xs"></i></button>
                        <input type="number" value="${i.qty}" onchange="setQty(${idx}, this.value)" class="qty-input" inputmode="decimal">
                        <button onclick="changeQty(${idx}, 1)" class="qty-btn"><i class="fa-solid fa-plus text-xs"></i></button>
                    </div>
                `;
                list.appendChild(itemDiv);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>[${i.cat.replace("工程","")}]</b><br>${i.name}</td>
                    <td align="center">${i.unit}</td>
                    <td align="center"><b>${i.qty}</b></td>
                    <td align="right">$${i.price.toLocaleString()}</td>
                    <td align="right">$${(i.price * i.qty).toLocaleString()}</td>
                    <td align="right"><b>$${Math.round(i.price * 1.3 * i.qty).toLocaleString()}</b></td>
                `;
                rows.appendChild(tr);
            });

            document.getElementById('r-sum-b').innerText = `$${bt.toLocaleString()}`;
            document.getElementById('r-sum-r').innerText = `$${rt.toLocaleString()}`;
        }

        window.changeQty = (idx, d) => {
            basket[idx].qty = Math.max(0, basket[idx].qty + d);
            if(basket[idx].qty === 0) basket.splice(idx, 1);
            update();
        }
        window.setQty = (idx, v) => {
            basket[idx].qty = Math.max(0, parseFloat(v) || 0);
            if(basket[idx].qty === 0) basket.splice(idx, 1);
            update();
        }
        window.resetBasket = () => { if(confirm("確定清空估價單？")) { basket = []; update(); } }

        function takeDownload() {
            if(basket.length === 0) return;
            const area = document.getElementById('capture-area');
            document.getElementById('p-date').innerText = new Date().toLocaleString();
            area.style.display = 'block';
            html2canvas(area, { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = `會勘估價_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL();
                link.click();
                area.style.display = 'none';
            });
        }

        window.onload = init;
    </script>
</body>
</html>
