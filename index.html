<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>114年工程會勘估價參考系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: env(safe-area-inset-bottom); overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dynamic-island { background: rgba(26, 26, 28, 0.98); backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 2.5rem; box-shadow: 0 -20px 60px rgba(0,0,0,0.8); pointer-events: auto; }
        .active-tab { background: #B91C1C !important; color: #fff !important; font-weight: 800; transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .island-container { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding: 12px 16px calc(15px + env(safe-area-inset-bottom)); pointer-events: none; }
        
        .name-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; width: 100%; padding: 16px; color: #fff; font-size: 16px; font-weight: bold; outline: none; }
        .name-input:focus { border-color: #B91C1C; background: rgba(255,255,255,0.1); }
        .qty-box { background: rgba(255,255,255,0.08); border-radius: 12px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .qty-input { background: transparent; width: 60px; text-align: center; font-size: 18px; font-weight: 900; color: #fff; border: none; outline: none; padding: 8px 0; }

        /* --- 報表端 UI --- */
        #atayal-report {
            background: #fff; color: #000; width: 1000px; 
            padding: 60px; position: fixed; left: 0; top: 0;
            z-index: -100; visibility: hidden; display: flex; flex-direction: column;
        }
        .ancestor-pattern { height: 18px; background: #B91C1C; background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 50%, #000 50%, #000 75%, transparent 75%, transparent); background-size: 20px 20px; }
        .report-header { text-align: center; margin: 40px 0; }
        .report-header h1 { font-size: 32pt; font-weight: 900; color: #B91C1C; margin: 0; border-bottom: 4px solid #000; display: inline-block; padding: 0 40px 10px 40px; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 30px; border: 2pt solid #000; }
        .report-table th { background: #000 !important; color: #fff !important; padding: 15px; font-size: 11pt; }
        .report-table td { border: 0.5pt solid #000; padding: 12px; font-size: 11pt; color: #000; }
        .cat-tag { font-size: 8pt; color: #B91C1C; font-weight: bold; display: block; margin-bottom: 2px; }
        .val-right { text-align: right !important; font-family: 'Courier New', monospace; font-weight: bold; }
        .total-container { margin-top: 30px; border-left: 10px solid #B91C1C; background: #f8f8f8; padding: 25px; }
        .total-item { display: flex; justify-content: flex-end; align-items: baseline; margin-bottom: 5px; }
        .total-label { font-size: 12pt; color: #666; width: 300px; text-align: right; }
        .total-val { font-size: 18pt; font-weight: 900; width: 220px; text-align: right; }
        .total-final { font-size: 28pt; color: #B91C1C; }
        .stamp-area { margin-top: 60px; display: flex; justify-content: flex-end; }
        .stamp-line { border-bottom: 2pt solid #000; width: 250px; text-align: center; padding-bottom: 10px; font-size: 14pt; font-weight: bold; }
        
        #line-alert { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

</head>

    <div id="line-alert">

        <p class="text-white/40 text-sm mb-8">LINE 內部環境無法下載報表</p>
        <button onclick="document.getElementById('line-alert').style.display='none'" class="px-10 py-3 bg-white/10 rounded-full text-sm">我已知曉</button>
    </div>

    <header class="sticky top-0 z-50 bg-black/85 backdrop-blur-xl px-6 pt-10 pb-8 border-b border-white/5">
        <h1 class="text-4xl font-black tracking-tighter">114年會勘估價</h1>
        <div class="mt-4 bg-red-700/10 border-l-4 border-red-700 p-4 rounded-r-xl">
            <p id="web-leg" class="text-[10px] text-red-400 font-bold italic leading-tight"></p>
        </div>
        <div class="mt-6 relative">
            <input type="text" id="search" placeholder="搜尋項目名稱 (如：擋土牆, 涵管)..." class="w-full bg-white/10 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white outline-none focus:ring-2 focus:ring-red-600">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/20"></i>
        </div>
        <div id="cat-nav" class="flex gap-2 overflow-x-auto no-scrollbar mt-4 pb-1"></div>
    </header>

    <main id="main-list" class="px-4 py-4 space-y-4 mb-96"></main>

    <div class="island-container">
        <div class="dynamic-island">
            <div id="island-summary" class="p-6 flex justify-between items-center cursor-pointer">
                <div class="flex gap-8">
                    <div>
                        <p class="text-[8px] text-white/40 font-bold mb-1">基準預算</p>
                        <p id="sum-b" class="text-xl font-black">$0</p>
                    </div>
                    <div class="border-l border-white/10 pl-6">
                        <p class="text-[8px] text-red-500 font-black mb-1">偏遠(+30%)</p>
                        <p id="sum-r" class="text-3xl font-black text-red-500">$0</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div id="count-tag" class="h-12 w-12 rounded-2xl border-2 border-white/10 flex items-center justify-center text-white/30 font-black text-xs">0</div>
                    <i class="fa-solid fa-chevron-up text-white/20" id="chevron"></i>
                </div>
            </div>
            
            <div id="island-drawer" class="hidden px-5 pb-8 border-t border-white/5 pt-6">
                <input type="text" id="proj-name" placeholder="工程名稱 (選填)..." class="name-input mb-6">
                <div id="basket-items" class="space-y-4 max-h-[35vh] overflow-y-auto no-scrollbar mb-8"></div>
                <div class="space-y-3">
                    <button id="dl-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all tracking-widest uppercase">【 下載報表影像 】</button>
                    <button onclick="clearBasket()" class="w-full border-2 border-red-900/30 text-red-700 py-3 rounded-2xl font-bold text-[10px] tracking-widest uppercase active:bg-red-700 active:text-white transition-all">清空目前估價單內容</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 隱藏報表容器 -->
    <div id="atayal-report">
        <div class="ancestor-pattern"></div>
        <div class="report-header">
            <h1 id="r-title">工程會勘估價清單</h1>
        </div>
        <table class="report-table">
            <thead>
                <tr>
                    <th align="left">工程項目規格</th>
                    <th width="60">單位</th>
                    <th width="60">數量</th>
                    <th width="120">單價(基準)</th>
                    <th width="130">基準小計</th>
                    <th width="150">偏遠小計(+30%)</th>
                </tr>
            </thead>
            <tbody id="r-body"></tbody>
        </table>
        <div class="total-container">
            <div class="total-item">
                <span class="total-label">基準預算總計：</span>
                <span id="r-sum-b" class="total-val"></span>
            </div>
            <div class="total-item">
                <span class="total-label" style="font-weight:bold; color:#B91C1C">偏遠初估預算總額 (TWD)：</span>
                <span id="r-sum-r" class="total-val total-final"></span>
            </div>
        </div>
        <div class="stamp-area">
            <div>
                <p style="margin-bottom: 40px; font-weight: 900; font-size: 14pt;">【編製人簽章】</p>
                <div class="stamp-line"></div>
            </div>
        </div>
        <div class="footer-disclaimer" style="margin-top:40px; font-size:9pt; color:#444;">

        </div>
        <div class="ancestor-pattern" style="margin-top:30px"></div>
    </div>

            {cat:"邊坡保護工程", name:"掛網噴植", price:800, unit:"m²"},
            {cat:"邊坡保護工程", name:"掛網噴凝土", price:2200, unit:"m²"},
            {cat:"邊坡保護工程", name:"鋪網噴凝土溝", price:2600, unit:"m"},
            {cat:"邊坡保護工程", name:"混凝土拍漿溝", price:5000, unit:"m"},
            {cat:"邊坡保護工程", name:"自由梁框掛網噴植", price:4000, unit:"m²"},
            {cat:"邊坡保護工程", name:"型框邊坡噴植", price:5000, unit:"m²"},
            {cat:"邊坡保護工程", name:"阻絕式防落石柵(3M型鋼)(H150×H150型鋼)", price:12000, unit:"m"},
            {cat:"邊坡保護工程", name:"岩釘鑽孔灌漿", price:4000, unit:"支"},
            {cat:"邊坡保護工程", name:"打設橫向集水管", price:3600, unit:"m"}
        ];

        let basket = [];
        let curCat = "全部";

        function init() {
            document.getElementById('web-leg').innerText = LEGAL;
            document.getElementById('p-leg').innerText = LEGAL;
            
            const nav = document.getElementById('cat-nav');
            CATEGORIES.forEach(c => {
                const b = document.createElement('button');
                b.className = "px-5 py-2 rounded-full text-[11px] font-black glass text-white/30 transition-all whitespace-nowrap";
                b.innerText = c;
                if(c === "全部") b.classList.add('active-tab');
                b.onclick = () => {
                    curCat = c;
                    document.querySelectorAll('#cat-nav button').forEach(x => x.classList.remove('active-tab'));
                    b.classList.add('active-tab');
                    renderList();
                };
                nav.appendChild(b);
            });

            document.getElementById('search').oninput = renderList;
            document.getElementById('island-summary').onclick = toggleDrawer;
            document.getElementById('dl-btn').onclick = downloadReport;

            renderList();
        }

        function toggleDrawer() {
            const drawer = document.getElementById('island-drawer');
            const chevron = document.getElementById('chevron');
            drawer.classList.toggle('hidden');
            chevron.style.transform = drawer.classList.contains('hidden') ? '' : 'rotate(180deg)';
        }

        function renderList() {
            const container = document.getElementById('main-list');
            const kw = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';

            DB.filter(i => (curCat === "全部" || i.cat === curCat) && i.name.toLowerCase().includes(kw)).forEach(i => {
                const div = document.createElement('div');
                div.className = 'glass rounded-[2rem] p-6 flex justify-between items-center active:scale-95 transition-all cursor-pointer';
                div.onclick = () => {
                    const ex = basket.find(b => b.name === i.name);
                    if(ex) ex.qty++; else basket.push({...i, qty: 1});
                    update();
                };
                div.innerHTML = `
                    <div class="flex-1">
                        <div class="text-[9px] font-black text-red-600 uppercase mb-1 underline underline-offset-4 decoration-red-900/50">${i.cat}</div>
                        <h3 class="text-xl font-bold">${i.name}</h3>
                        <div class="flex gap-4 mt-2 font-mono text-sm">
                            <span class="text-white/60">基準: $${i.price.toLocaleString()}</span>
                            <span class="text-red-500">偏遠: $${Math.round(i.price*1.3).toLocaleString()}</span>
                        </div>
                    </div>
                    <div class="h-10 w-10 rounded-full bg-white/10 flex items-center justify-center"><i class="fa-solid fa-plus"></i></div>
                `;
                container.appendChild(div);
            });
        }

        function update() {
            const bt = basket.reduce((s, i) => s + (i.price * i.qty), 0);
            const rt = Math.round(bt * 1.3);

            document.getElementById('sum-b').innerText = `$${bt.toLocaleString()}`;
            document.getElementById('sum-r').innerText = `$${rt.toLocaleString()}`;
            document.getElementById('count-tag').innerText = basket.length;

            const list = document.getElementById('basket-items');
            list.innerHTML = '';
            basket.forEach((i, idx) => {
                const row = document.createElement('div');
                row.className = 'flex justify-between items-center p-4 bg-white/5 rounded-2xl';
                row.innerHTML = `
                    <div class="flex-1">
                        <p class="text-sm font-bold">${i.name}</p>
                        <p class="text-[10px] text-white/30">$${i.price.toLocaleString()} / ${i.unit}</p>
                    </div>
                    <div class="qty-box">
                        <button onclick="changeQty(${idx}, -1)" class="w-10 h-10 text-white/30"><i class="fa-solid fa-minus"></i></button>
                        <input type="number" value="${i.qty}" onchange="setQty(${idx}, this.value)" class="qty-input">
                        <button onclick="changeQty(${idx}, 1)" class="w-10 h-10 text-white/30"><i class="fa-solid fa-plus"></i></button>
                    </div>
                `;
                list.appendChild(row);
            });

            // 更新隱藏報表
            const rBody = document.getElementById('r-body');
            rBody.innerHTML = '';
            basket.forEach(i => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="cat-tag">${i.cat}</span><b>${i.name}</b></td>
                    <td align="center">${i.unit}</td>
                    <td align="center"><b>${i.qty}</b></td>
                    <td class="val-right">${i.price.toLocaleString()}</td>
                    <td class="val-right">${(i.price * i.qty).toLocaleString()}</td>
                    <td class="val-right" style="color:#B91C1C">${Math.round(i.price * 1.3 * i.qty).toLocaleString()}</td>
                `;
                rBody.appendChild(tr);
            });
            document.getElementById('r-sum-b').innerText = `$${bt.toLocaleString()}`;
            document.getElementById('r-sum-r').innerText = `$${rt.toLocaleString()}`;
        }

        async function downloadReport() {
            if(basket.length === 0) { alert("清單為空"); return; }
            if (/Line/i.test(navigator.userAgent)) {
                document.getElementById('line-alert').style.display = 'flex';
                return;
            }

            const out = document.getElementById('atayal-report');
            const projName = document.getElementById('proj-name').value.trim();
            document.getElementById('r-title').innerText = projName ? projName + " 會勘估價清單" : "工程會勘估價清單";
            document.getElementById('p-date').innerText = new Date().toLocaleString();

            out.style.visibility = 'visible';
            const canvas = await html2canvas(out, { scale: 2, backgroundColor: "#ffffff" });
            out.style.visibility = 'hidden';

            const link = document.createElement('a');
            link.download = `會勘估價_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        window.changeQty = (idx, d) => { basket[idx].qty = Math.max(0, basket[idx].qty + d); if(basket[idx].qty === 0) basket.splice(idx, 1); update(); }
        window.setQty = (idx, v) => { basket[idx].qty = Math.max(0, parseInt(v) || 0); if(basket[idx].qty === 0) basket.splice(idx, 1); update(); }
        window.clearBasket = () => { if(confirm("確定清空嗎？")) { basket = []; update(); } }

        window.onload = init;
    </script>
