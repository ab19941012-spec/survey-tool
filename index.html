<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>114年常用工程平均單價參考系統</title>
    <!-- 引入穩定 CDN 資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- 網頁 UI: iPhone 17 Pro Obsidian Style --- */
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .dynamic-island { background: rgba(28, 28, 30, 0.98); backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 2.5rem; box-shadow: 0 -10px 50px rgba(0,0,0,0.8); pointer-events: auto; }
        .active-tab { background: #E63946 !important; color: #fff !important; font-weight: 800; transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 底部控制島佈局 */
        .island-container { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding: 12px 16px calc(15px + env(safe-area-inset-bottom)); background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); pointer-events: none; }

        /* 輸入體驗優化 */
        .name-input { background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 16px; width: 100%; padding: 16px; color: #fff; font-size: 16px; font-weight: bold; outline: none; transition: 0.3s; margin-bottom: 20px; }
        .name-input:focus { border-color: #E63946; background: rgba(255,255,255,0.1); }
        .qty-box { background: rgba(255,255,255,0.08); border-radius: 12px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .qty-input { background: transparent; width: 75px; text-align: center; font-size: 18px; font-weight: 900; color: #fff; border: none; outline: none; padding: 8px 0; }

        /* --- 下載報表樣式 (隱藏) --- */
        #atayal-report {
            background: #fff; color: #000; width: 850px; 
            padding: 2cm; /* 安全邊距 2公分 */
            position: absolute; left: -9999px; top: 0;
        }
        .rhombus-bar { height: 12px; background-color: #E63946; background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 50%, #000 50%, #000 75%, transparent 75%, transparent); background-size: 18px 18px; }
        .report-table { width: 100%; border-collapse: collapse; margin: 30px 0; border: 2.5px solid #000; }
        .report-table th { background: #f2f2f2; padding: 14px; border: 1.5px solid #000; font-size: 11pt; text-align: left; }
        .report-table td { padding: 12px; border: 1px solid #000; font-size: 10.5pt; line-height: 1.5; }
        .stamp-line { display: inline-block; width: 220px; border-bottom: 2px solid #000; margin-top: 15px; height: 60px; }
    </style>
</head>
<body>

    <!-- 頂部區 -->
    <header class="sticky top-0 z-50 bg-black/85 backdrop-blur-xl px-6 pt-10 pb-8 border-b border-white/5">
        <p class="text-white/20 text-[9px] font-black tracking-[0.4em] uppercase mb-1">Standard Item Database 114</p>
        <h1 class="text-4xl font-black tracking-tighter italic">會勘估價參考</h1>
        
        <div class="mt-4 bg-red-600/10 border-l-4 border-red-600 p-4 rounded-r-xl">
            <p id="legal-web" class="text-[11px] text-red-400 font-bold italic leading-tight"></p>
        </div>

        <div class="mt-6 relative">
            <input type="text" id="search" placeholder="搜尋高度(12M)、箱涵、管徑..." class="w-full bg-white/10 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white focus:ring-2 focus:ring-red-600 outline-none transition-all">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/20"></i>
        </div>
        <div id="cat-nav" class="flex gap-2 overflow-x-auto no-scrollbar mt-4 pb-1"></div>
    </header>

    <!-- 列表主體 -->
    <main id="main-list" class="px-4 py-4 space-y-3 mb-96"></main>

    <!-- 底部控制島 -->
    <div class="island-container">
        <div class="dynamic-island">
            <!-- 摘要區域 -->
            <div id="summary-bar" class="p-6 flex justify-between items-center cursor-pointer active:bg-white/5 transition-all">

                    <div>
                        <p class="text-[8px] text-white/40 font-black uppercase mb-1">基準預算計</p>
                        <p id="sum-base" class="text-xl font-black text-white/90 leading-none">$0</p>
                    </div>
                    <div class="border-l border-white/10 pl-6">
                        <p class="text-[8px] text-red-500 font-black uppercase mb-1">偏遠(+30%)</p>
                        <p id="sum-remote" class="text-3xl font-black text-red-500 leading-none">$0</p>
                    </div>
                </div>
                <div id="count-circle" class="h-10 w-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-white/30 font-black text-xs">0</div>
            </div>
            
            <!-- 展開細節與控制 -->
            <div id="drawer-content" class="hidden px-5 pb-6 border-t border-white/5 pt-5">
                <div class="mb-4">
                    <p class="text-[10px] text-white/40 font-black uppercase tracking-widest mb-2 px-1">工程名稱 (將自動整合至標題)</p>
                    <input type="text" id="project-name" placeholder="輸入名稱..." class="name-input">
                </div>

                <div id="basket-items" class="space-y-4 max-h-[35vh] overflow-y-auto no-scrollbar mb-6"></div>
                
                <div class="space-y-3">
                    <button id="download-btn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-blue-600/30 active:scale-95 transition-all tracking-widest">【下載】</button>
                    <button onclick="clearBasket()" class="w-full border-2 border-red-600/30 text-red-500 py-3 rounded-2xl font-bold text-xs tracking-widest uppercase active:bg-red-600 active:text-white transition-all">清空目前估價單內容</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 泰雅風格下載報表 (預覽不可見) -->
    <div id="atayal-report">
        <div class="rhombus-bar"></div>
        <div style="text-align: center; margin: 40px 0;">
            <h1 id="report-title" style="font-size: 26pt; font-weight: 900; color: #E63946; margin: 0; letter-spacing: 1px;">工程會勘估價清單</h1>
        </div>
        
        <table class="report-table">
            <thead>
                <tr>
                    <th align="left">工程規格與項目名稱</th>
                    <th width="60">單位</th>
                    <th width="60">數量</th>
                    <th width="100">單價(基準)</th>
                    <th width="100">基準小計</th>
                    <th width="120">偏遠(+30%)</th>
                </tr>
            </thead>
            <tbody id="r-body"></tbody>
            <tfoot>
                <tr style="background:#f9f9f9; font-weight:900; font-size:14pt;">
                    <td colspan="4" align="right" style="padding:15px;">初估總計預算額 (TWD)：</td>
                    <td id="r-sum-b"></td>
                    <td id="r-sum-r" style="color:#E63946"></td>
                </tr>
            </tfoot>
        </table>

        <div style="margin-top: 70px; display: flex; justify-content: flex-end; padding-right: 20px;">
            <div style="text-align: center;">
                <p style="font-weight: bold; font-size: 14pt; margin: 0;">【編製】</p>
                <div class="stamp-line"></div>
            </div>
        </div>

        <div style="margin-top: 60px; border-top: 1.5px solid #000; padding-top: 15px; font-size: 9.5pt; color: #000; line-height: 1.6;">

            產生日期：<span id="p-date"></span>
        </div>
        <div class="rhombus-bar" style="margin-top:30px;"></div>
    </div>

        let basket = [];
        let curCat = "全部";

        function init() {
            document.getElementById('legal-web').innerText = LEGAL;
            document.getElementById('print-leg').innerText = LEGAL;
            
            const nav = document.getElementById('cat-nav');
            CATEGORIES.forEach(c => {
                const b = document.createElement('button');
                b.className = "px-5 py-2 rounded-full text-[11px] font-black glass text-white/30 transition-all whitespace-nowrap";
                b.innerText = c;
                if(c === "全部") b.classList.add('active-tab');
                b.onclick = () => {
                    curCat = c;
                    document.querySelectorAll('#cat-nav button').forEach(x => x.classList.remove('active-tab'));
                    b.classList.add('active-tab');
                    render();
                };
                nav.appendChild(b);
            });

            document.getElementById('search').oninput = render;
            document.getElementById('summary-bar').onclick = () => document.getElementById('drawer-content').classList.toggle('hidden');
            
            document.getElementById('download-btn').onclick = async (e) => {
                e.stopPropagation();
                if(basket.length === 0) return;
                
                const out = document.getElementById('atayal-report');
                const projectInput = document.getElementById('project-name').value.trim();
                
                // --- 標題邏輯優化 ---
                document.getElementById('report-title').innerText = projectInput ? projectInput + "工程會勘估價清單" : "工程會勘估價清單";
                document.getElementById('p-date').innerText = new Date().toLocaleString();
                
                out.style.display = 'block';
                const canvas = await html2canvas(out, { scale: 2, backgroundColor: "#ffffff" });
                const link = document.createElement('a');
                link.download = `${projectInput || '工程會勘'}_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                out.style.display = 'none';
            };
            render();
        }

        function render() {
            const container = document.getElementById('main-list');
            const kw = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';

            DATABASE.filter(i => (curCat === "全部" || i.cat === curCat) && i.name.toLowerCase().includes(kw)).forEach(i => {
                const div = document.createElement('div');
                div.className = 'glass rounded-[2rem] p-5 flex justify-between items-center active:scale-95 transition-all';
                div.onclick = () => {
                    const ex = basket.find(b => b.name === i.name);
                    if(ex) ex.qty++; else basket.push({...i, qty: 1});
                    update();
                };
                div.innerHTML = `
                    <div class="flex-1 mr-4">
                        <div class="text-[9px] font-black text-red-500 uppercase tracking-widest mb-1 underline decoration-red-500/20 underline-offset-4">${i.cat}</div>
                        <h3 class="text-lg font-bold leading-tight tracking-tight">${i.name}</h3>
                        <div class="flex gap-6 mt-2">
                            <div><p class="text-[9px] text-white/30 font-bold uppercase">基準</p><p class="text-md font-mono font-bold">$${i.price.toLocaleString()}</p></div>
                            <div><p class="text-[9px] text-white/30 font-bold uppercase text-red-400">偏遠(+30%)</p><p class="text-md font-mono font-bold text-red-500">$${Math.round(i.price*1.3).toLocaleString()}</p></div>
                        </div>
                    </div>
                    <div class="h-10 w-10 rounded-full bg-white/5 flex items-center justify-center text-white/30"><i class="fa-solid fa-plus text-sm"></i></div>
                `;
                container.appendChild(div);
            });
        }

        function update() {
            const bt = basket.reduce((s, i) => s + (i.price * i.qty), 0);
            const rt = Math.round(bt * 1.3);
            document.getElementById('sum-base').innerText = `$${bt.toLocaleString()}`;
            document.getElementById('sum-remote').innerText = `$${rt.toLocaleString()}`;
            document.getElementById('count-circle').innerText = basket.length;

            const list = document.getElementById('basket-items');
            const rBody = document.getElementById('r-body');
            list.innerHTML = ''; rBody.innerHTML = '';

            basket.forEach((i, idx) => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-5 bg-white/5 rounded-[2.2rem] border border-white/5';
                div.innerHTML = `
                    <div class="flex-1 pr-4">
                        <p class="text-sm font-bold text-white/90 leading-tight">${i.name}</p>
                        <p class="text-[10px] text-white/20 font-mono italic mt-1">$${i.price.toLocaleString()} / ${i.unit}</p>
                    </div>
                    <div class="qty-box">
                        <button onclick="changeQty(${idx}, -1)" class="w-10 h-10 text-white/30"><i class="fa-solid fa-minus text-xs"></i></button>
                        <input type="number" value="${i.qty}" onchange="setQty(${idx}, this.value)" class="qty-input" inputmode="decimal">
                        <button onclick="changeQty(${idx}, 1)" class="w-10 h-10 text-white/30"><i class="fa-solid fa-plus text-xs"></i></button>
                    </div>
                `;
                list.appendChild(div);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>[${i.cat.replace("工程","")}]</b><br>${i.name}</td>
                    <td align="center">${i.unit}</td>
                    <td align="center"><b>${i.qty}</b></td>
                    <td align="right">$${i.price.toLocaleString()}</td>
                    <td align="right">$${(i.price * i.qty).toLocaleString()}</td>
                    <td align="right"><b>$${Math.round(i.price * 1.3 * i.qty).toLocaleString()}</b></td>
                `;
                rBody.appendChild(tr);
            });

            document.getElementById('r-sum-b').innerText = `$${bt.toLocaleString()}`;
            document.getElementById('r-sum-r').innerText = `$${rt.toLocaleString()}`;
        }

        window.changeQty = (idx, d) => {
            basket[idx].qty = Math.max(0, basket[idx].qty + d);
            if(basket[idx].qty === 0) basket.splice(idx, 1);
            update();
        }
        window.setQty = (idx, v) => {
            basket[idx].qty = Math.max(0, parseFloat(v) || 0);
            if(basket[idx].qty === 0) basket.splice(idx, 1);
            update();
        }
        window.clearBasket = () => { if(confirm("清空？")) { basket = []; update(); } }

        window.onload = init;
    </script>
</body>
</html>
