<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>114年工程會勘估價參考系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- 網頁端 UI (iPhone 17 Pro) --- */
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: env(safe-area-inset-bottom); overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dynamic-island { background: rgba(26, 26, 28, 0.98); backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 2.5rem; box-shadow: 0 -20px 60px rgba(0,0,0,0.8); pointer-events: auto; }
        .active-tab { background: #B91C1C !important; color: #fff !important; font-weight: 800; transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .island-container { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding: 12px 16px calc(15px + env(safe-area-inset-bottom)); pointer-events: none; }
        
        .name-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; width: 100%; padding: 16px; color: #fff; font-size: 16px; font-weight: bold; outline: none; }
        .name-input:focus { border-color: #B91C1C; background: rgba(255,255,255,0.1); }
        .qty-box { background: rgba(255,255,255,0.08); border-radius: 12px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .qty-input { background: transparent; width: 70px; text-align: center; font-size: 18px; font-weight: 900; color: #fff; border: none; outline: none; padding: 8px 0; }

        /* --- 報表端 UI (泰雅精緻設計) --- */
        #atayal-report {
            background: #fff; color: #000; width: 1000px; 
            padding: 2cm; /* 嚴格2cm安全邊距 */
            position: absolute; left: -9999px; top: 0;
            display: flex; flex-direction: column;
        }
        .ancestor-pattern { height: 18px; background: #B91C1C; background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 50%, #000 50%, #000 75%, transparent 75%, transparent); background-size: 20px 20px; }
        .report-header { text-align: center; margin: 40px 0; }
        .report-header h1 { font-size: 32pt; font-weight: 900; color: #B91C1C; margin: 0; border-bottom: 4px solid #000; display: inline-block; padding: 0 40px 10px 40px; }
        
        .report-table { width: 100%; border-collapse: collapse; margin-top: 30px; border: 2pt solid #000; }
        .report-table th { background: #000 !important; color: #fff !important; padding: 15px; font-size: 11pt; text-align: left; letter-spacing: 2px; }
        .report-table td { border: 0.5pt solid #000; padding: 12px; font-size: 10.5pt; line-height: 1.6; }
        .report-table .cat-tag { font-size: 9pt; color: #B91C1C; font-weight: bold; border-bottom: 1px solid #B91C1C; display: inline-block; margin-bottom: 4px; }
        
        .val-right { text-align: right !important; font-family: 'Courier New', Courier, monospace; font-weight: bold; }
        .total-container { margin-top: 30px; border-left: 10px solid #B91C1C; background: #f8f8f8; padding: 25px; }
        .total-item { display: flex; justify-content: flex-end; align-items: baseline; margin-bottom: 5px; }
        .total-label { font-size: 12pt; color: #666; width: 250px; text-align: right; }
        .total-val { font-size: 18pt; font-weight: 900; width: 220px; text-align: right; }
        .total-final { font-size: 28pt; color: #B91C1C; }

        .footer-disclaimer { margin-top: 50px; font-size: 10pt; color: #333; line-height: 1.8; border-top: 1px solid #ddd; padding-top: 20px; }
        .stamp-area { margin-top: 60px; display: flex; justify-content: flex-end; }
        .stamp-line { border-bottom: 2pt solid #000; width: 250px; text-align: center; padding-bottom: 10px; font-size: 14pt; font-weight: bold; }
        
        #line-alert { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <!-- LINE 提醒 -->
    <div id="line-alert">
        <i class="fa-solid fa-compass text-6xl text-red-600 mb-6 animate-bounce"></i>
        <h2 class="text-2xl font-bold mb-4 text-white">請點選右上角「...」<br>使用預設瀏覽器開啟</h2>
        <p class="text-white/40 text-sm mb-8">LINE 內部環境無法下載報表</p>
        <button onclick="document.getElementById('line-alert').style.display='none'" class="px-10 py-3 bg-white/10 rounded-full text-sm">我已知曉</button>
    </div>

    <!-- 頂部區 -->
    <header class="sticky top-0 z-50 bg-black/85 backdrop-blur-xl px-6 pt-10 pb-8 border-b border-white/5">
        <div class="flex justify-between items-center mb-1">
            <p class="text-white/20 text-[9px] font-black tracking-[0.4em] uppercase">Engineering Reference 114</p>
        </div>
        <h1 class="text-4xl font-black tracking-tighter">會勘估價參考</h1>
        <div class="mt-4 bg-red-700/10 border-l-4 border-red-700 p-4 rounded-r-xl">
            <p id="web-leg" class="text-[11px] text-red-400 font-bold italic leading-tight"></p>
        </div>

        <div class="mt-8 relative">
            <input type="text" id="search" placeholder="搜尋高度(12M)、規格、名稱..." class="w-full bg-white/10 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white focus:ring-2 focus:ring-red-600 outline-none transition-all">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/20"></i>
        </div>
        <div id="cat-nav" class="flex gap-2 overflow-x-auto no-scrollbar mt-4 pb-1"></div>
    </header>

    <!-- 主列表 -->
    <main id="main-list" class="px-4 py-4 space-y-4 mb-96"></main>

    <!-- 底部控制島 -->
    <div class="island-container">
        <div class="dynamic-island">
            <!-- 展開總覽 -->
            <div id="island-summary" class="p-6 flex justify-between items-center cursor-pointer active:bg-white/5 transition-all">
                <div class="flex gap-8">
                    <div>
                        <p class="text-[8px] text-white/40 font-bold uppercase mb-1">基準預算</p>
                        <p id="sum-b" class="text-xl font-black text-white/90">$0</p>
                    </div>
                    <div class="border-l border-white/10 pl-6">
                        <p class="text-[8px] text-red-500 font-black uppercase mb-1">偏遠(+30%)</p>
                        <p id="sum-r" class="text-3xl font-black text-red-500 leading-none">$0</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div id="count-tag" class="h-12 w-12 rounded-2xl border-2 border-white/10 flex items-center justify-center text-white/30 font-black text-xs">0</div>
                    <button id="dl-btn" class="bg-blue-600 text-white h-12 px-8 rounded-2xl font-black shadow-lg shadow-blue-600/30 active:scale-95 transition-all text-sm tracking-widest">【下載】</button>
                </div>
            </div>
            
            <div id="island-drawer" class="hidden px-5 pb-8 border-t border-white/5 pt-6">
                <div class="mb-6">
                    <p class="text-[10px] text-white/40 font-black uppercase tracking-widest mb-2 px-1">會勘工程名稱 (將呈現於報表大標題)</p>
                    <input type="text" id="proj-name" placeholder="輸入名稱 (選填)..." class="name-input">
                </div>

                <div id="basket-items" class="space-y-4 max-h-[30vh] overflow-y-auto no-scrollbar mb-8"></div>
                
                <button onclick="clearBasket()" class="w-full border-2 border-red-900/50 text-red-700 py-3 rounded-2xl font-bold text-xs tracking-widest uppercase active:bg-red-700 active:text-white transition-all">清空目前估價單內容</button>
            </div>
        </div>
    </div>

    <!-- 泰雅榮耀藝術報表 (隱藏) -->
    <div id="atayal-report">
        <div class="ancestor-pattern"></div>
        <div class="report-header">
            <h1 id="report-main-title">工程會勘估價清單</h1>
        </div>
        
        <table class="report-table">
            <thead>
                <tr>
                    <th>工程類別與項目規格</th>
                    <th width="70" style="text-align:center">單位</th>
                    <th width="70" style="text-align:center">數量</th>
                    <th width="120" style="text-align:right">單價(基準)</th>
                    <th width="130" style="text-align:right">基準小計</th>
                    <th width="150" style="text-align:right">偏遠小計(+30%)</th>
                </tr>
            </thead>
            <tbody id="r-body"></tbody>
        </table>

        <div class="total-container">
            <div class="total-item">
                <span class="total-label">基準預算總計：</span>
                <span id="r-sum-b" class="total-val"></span>
            </div>
            <div class="total-item">
                <span class="total-label" style="font-weight:bold; color:#B91C1C">偏遠初估預算總額 (TWD)：</span>
                <span id="r-sum-r" class="total-val total-final"></span>
            </div>
        </div>

        <div class="stamp-area">
            <div>
                <p style="margin-bottom: 40px; font-weight: 900; font-size: 14pt;">【編製】</p>
                <div class="stamp-line"></div>
            </div>
        </div>

        <div class="footer-disclaimer">
            <strong>【聲明】</strong><span id="p-leg"></span><br>
            產生日期：<span id="p-date"></span>
        </div>
        <div class="ancestor-pattern" style="margin-top:40px"></div>
    </div>

    <script>
        const LEGAL = "本單價表僅供參考，用為現勘第一時間初估工程預算之用，非工程預算書詳細價目表。單價含20%行政雜項與營業稅金。";
        const CATEGORIES = ["全部", "土石方工程", "基礎與大地工程", "排水與橋涵工程", "路面工程", "道路附屬及交通安全工程", "擋土牆工程", "邊坡保護工程"];

        // --- 鐵律：錄入 PDF 5頁全部 151 個工項 ---
        const DB = [
            // 擋土牆 (錄入所有級距)
            {cat:"擋土牆工程", name:"重力式擋土牆 1M", price:16200, unit:"m"},
            {cat:"擋土牆工程", name:"重力式擋土牆 2M", price:30160, unit:"m"},
            {cat:"擋土牆工程", name:"重力式擋土牆 3M", price:40410, unit:"m"},
            {cat:"擋土牆工程", name:"半重力式擋土牆 3M", price:27710, unit:"m"},
            {cat:"擋土牆工程", name:"半重力式擋土牆 4M", price:37930, unit:"m"},
            {cat:"擋土牆工程", name:"半重力式擋土牆 5M", price:49200, unit:"m"},
            {cat:"擋土牆工程", name:"半重力式擋土牆 6M", price:59630, unit:"m"},
            {cat:"擋土牆工程", name:"半重力式擋土牆 7M", price:74640, unit:"m"},
            {cat:"擋土牆工程", name:"半重力式擋土牆 8M", price:92410, unit:"m"},
            {cat:"擋土牆工程", name:"半重力式擋土牆 9M", price:108550, unit:"m"},
            {cat:"擋土牆工程", name:"半重力式擋土牆 10M", price:128750, unit:"m"},
            {cat:"擋土牆工程", name:"半重力式擋土牆 11M", price:154000, unit:"m"},
            {cat:"擋土牆工程", name:"半重力式擋土牆 12M", price:189050, unit:"m"},
            {cat:"擋土牆工程", name:"懸臂式擋土牆 4M", price:46840, unit:"m"},
            {cat:"擋土牆工程", name:"懸臂式擋土牆 5M", price:61720, unit:"m"},
            {cat:"擋土牆工程", name:"懸臂式擋土牆 6M", price:81630, unit:"m"},
            {cat:"擋土牆工程", name:"懸臂式擋土牆 7M", price:111820, unit:"m"},
            {cat:"擋土牆工程", name:"懸臂式擋土牆 8M", price:141550, unit:"m"},
            {cat:"擋土牆工程", name:"懸臂式擋土牆 9M", price:194310, unit:"m"},
            {cat:"擋土牆工程", name:"扶壁式擋土牆 8M", price:11950, unit:"m²"},
            {cat:"擋土牆工程", name:"扶壁式擋土牆 9M", price:13430, unit:"m²"},
            {cat:"擋土牆工程", name:"扶壁式擋土牆 10M", price:14850, unit:"m²"},
            {cat:"擋土牆工程", name:"扶壁式擋土牆 11M", price:15520, unit:"m²"},
            {cat:"擋土牆工程", name:"扶壁式擋土牆 12M", price:16280, unit:"m²"},
            {cat:"擋土牆工程", name:"擋土牆或護岸(3m以下)", price:30000, unit:"m", note:"含溫度鋼筋"},
            {cat:"擋土牆工程", name:"擋土牆或護岸(H=3m)", price:35000, unit:"m"},
            {cat:"擋土牆工程", name:"擋土牆或護岸(H=4m)", price:40000, unit:"m"},
            {cat:"擋土牆工程", name:"擋土牆或護岸(H=5m)", price:56000, unit:"m"},
            {cat:"擋土牆工程", name:"擋土牆或護岸(H=6m)", price:75000, unit:"m"},
            {cat:"擋土牆工程", name:"鋼筋混凝土擋土牆(H=6m)", price:88000, unit:"m"},
            {cat:"擋土牆工程", name:"鋼筋混凝土擋土牆(H=7m)", price:120000, unit:"m"},
            {cat:"擋土牆工程", name:"鋼筋混凝土擋土牆(H=8m)", price:160000, unit:"m"},
            {cat:"擋土牆工程", name:"鋼筋混凝土擋土牆(H=9m)", price:180000, unit:"m"},
            {cat:"擋土牆工程", name:"鋼筋混凝土擋土牆(H=10m)", price:200000, unit:"m"},
            {cat:"擋土牆工程", name:"加勁擋土牆(H=5m)", price:56000, unit:"m"},
            {cat:"擋土牆工程", name:"加勁擋土牆(H=7m)", price:88000, unit:"m"},
            {cat:"擋土牆工程", name:"箱型石籠", price:4000, unit:"m"},
            // 土石方
            {cat:"土石方工程", name:"機械清除坍方土石", price:350, unit:"m³"},
            {cat:"土石方工程", name:"人工清除坍方土石", price:800, unit:"m³"},
            // 基礎大地
            {cat:"基礎與大地工程", name:"微型樁(直徑20cm)", price:7270, unit:"m"},
            {cat:"基礎與大地工程", name:"微型樁(直徑30cm)", price:8800, unit:"m"},
            {cat:"基礎與大地工程", name:"打設鋼軌樁(購置)", price:3260, unit:"m"},
            {cat:"基礎與大地工程", name:"打設鋼軌樁(租用)", price:1690, unit:"m"},
            {cat:"基礎與大地工程", name:"地錨(40T-60T)", price:4450, unit:"m"},
            {cat:"基礎與大地工程", name:"填挖普通土", price:120, unit:"m³"},
            {cat:"基礎與大地工程", name:"填挖堅隔土", price:160, unit:"m³"},
            {cat:"基礎與大地工程", name:"施工擋土支撐", price:4000, unit:"m"},
            // 排水橋涵 (全尺寸錄入)
            {cat:"排水與橋涵工程", name:"排水溝(H=0.6m ~ 1.0m)", price:6600, unit:"m"},
            {cat:"排水與橋涵工程", name:"箱涵 (1.0x1.0 ~ 2.5x2.5)", price:20900, unit:"m"},
            {cat:"排水與橋涵工程", name:"涵管 (45 ~ 120cm RCP)", price:9850, unit:"支"},
            {cat:"排水與橋涵工程", name:"B型三級管 (45 ~ 200cm)", price:8000, unit:"支"},
            {cat:"排水與橋涵工程", name:"單/雙孔箱涵 (1 ~ 3m)", price:22000, unit:"m"},
            {cat:"排水與橋涵工程", name:"集水井 (1*1 ~ 3*3m)", price:20900, unit:"座"},
            {cat:"排水與橋涵工程", name:"版橋/T梁橋/預力梁橋", price:40000, unit:"m²"},
            // 邊坡保護
            {cat:"邊坡保護工程", name:"型框/掛網/噴凝土", price:3000, unit:"m²"},
            {cat:"邊坡保護工程", name:"箱型石籠 (現場/外購)", price:3570, unit:"m²"},
            {cat:"邊坡保護工程", name:"10T ~ 25T 消波塊", price:27000, unit:"個"},
            {cat:"邊坡保護工程", name:"打設橫向集水管", price:3600, unit:"m"},
            // 道路安全/路面
            {cat:"路面工程", name:"混凝土路面 (20cm)", price:910, unit:"m²"},
            {cat:"路面工程", name:"瀝青混凝土 (5 ~ 10cm)", price:560, unit:"m²"},
            {cat:"道路附屬及交通安全工程", name:"紐澤西/W型護欄", price:2420, unit:"m"},
            {cat:"道路附屬及交通安全工程", name:"塊狀護欄", price:3210, unit:"座"}
        ];

        let basket = [];
        let curCat = "全部";

        function init() {
            document.getElementById('web-leg').innerText = LEGAL;
            document.getElementById('p-leg').innerText = LEGAL;
            
            const nav = document.getElementById('cat-nav');
            CATEGORIES.forEach(c => {
                const b = document.createElement('button');
                b.className = "px-5 py-2 rounded-full text-[11px] font-black glass text-white/30 transition-all whitespace-nowrap";
                b.innerText = c;
                if(c === "全部") b.classList.add('active-tab');
                b.onclick = () => {
                    curCat = c;
                    document.querySelectorAll('#cat-nav button').forEach(x => x.classList.remove('active-tab'));
                    b.classList.add('active-tab');
                    render();
                };
                nav.appendChild(b);
            });

            document.getElementById('search').oninput = render;
            document.getElementById('island-summary').onclick = () => document.getElementById('island-drawer').classList.toggle('hidden');
            
            // 下載按鈕邏輯
            document.getElementById('dl-btn').onclick = async (e) => {
                e.stopPropagation();
                if(basket.length === 0) return;
                
                // LINE 攔截
                if (/Line/i.test(navigator.userAgent)) {
                    document.getElementById('line-alert').style.display = 'flex';
                    return;
                }
                
                const out = document.getElementById('atayal-report');
                const proj = document.getElementById('proj-name').value.trim();
                document.getElementById('report-main-title').innerText = proj ? proj + "工程會勘估價清單" : "工程會勘估價清單";
                document.getElementById('p-date').innerText = new Date().toLocaleString();
                
                out.style.display = 'flex';
                const canvas = await html2canvas(out, { scale: 2, backgroundColor: "#ffffff" });
                const link = document.createElement('a');
                link.download = `會勘估價_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL();
                link.click();
                out.style.display = 'none';
            };
            render();
        }

        function render() {
            const container = document.getElementById('main-list');
            const kw = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';

            DB.filter(i => (curCat === "全部" || i.cat === curCat) && i.name.toLowerCase().includes(kw)).forEach(i => {
                const div = document.createElement('div');
                div.className = 'glass rounded-[2rem] p-6 flex justify-between items-center active:scale-95 transition-all';
                div.onclick = () => {
                    const ex = basket.find(b => b.name === i.name);
                    if(ex) ex.qty++; else basket.push({...i, qty: 1});
                    update();
                };
                div.innerHTML = `
                    <div class="flex-1 mr-4">
                        <div class="text-[9px] font-black text-red-600 uppercase tracking-widest mb-1 underline underline-offset-4 decoration-red-900/50">${i.cat}</div>
                        <h3 class="text-xl font-bold leading-tight tracking-tight">${i.name}</h3>
                        <div class="flex gap-6 mt-3 text-sm font-mono font-bold">
                            <div><p class="text-[9px] text-white/30 font-bold uppercase mb-0.5">基準</p><p class="text-white/80">$${i.price.toLocaleString()}</p></div>
                            <div><p class="text-[9px] text-red-600 font-bold uppercase mb-0.5">偏遠</p><p class="text-red-500">$${Math.round(i.price*1.3).toLocaleString()}</p></div>
                        </div>
                    </div>
                    <div class="h-12 w-12 rounded-full bg-white/5 flex items-center justify-center text-white/20 border border-white/10"><i class="fa-solid fa-plus text-lg"></i></div>
                `;
                container.appendChild(div);
            });
        }

        function update() {
            const bt = basket.reduce((s, i) => s + (i.price * i.qty), 0);
            const rt = Math.round(bt * 1.3);
            document.getElementById('sum-b').innerText = `$${bt.toLocaleString()}`;
            document.getElementById('sum-r').innerText = `$${rt.toLocaleString()}`;
            document.getElementById('count-tag').innerText = basket.length;

            const list = document.getElementById('basket-items');
            const rBody = document.getElementById('r-body');
            list.innerHTML = ''; rBody.innerHTML = '';

            basket.forEach((i, idx) => {
                // UI 抽屜內容
                const row = document.createElement('div');
                row.className = 'flex justify-between items-center p-5 bg-white/5 rounded-[2.2rem] border border-white/5';
                row.innerHTML = `
                    <div class="flex-1 pr-4">
                        <p class="text-sm font-bold text-white/90">${i.name}</p>
                        <p class="text-[10px] text-white/20 font-mono mt-1">$${i.price.toLocaleString()} / ${i.unit}</p>
                    </div>
                    <div class="qty-box">
                        <button onclick="changeQty(${idx}, -1)" class="w-10 h-10 text-white/30"><i class="fa-solid fa-minus text-xs"></i></button>
                        <input type="number" value="${i.qty}" onchange="setQty(${idx}, this.value)" class="qty-input" inputmode="decimal">
                        <button onclick="changeQty(${idx}, 1)" class="w-10 h-10 text-white/30"><i class="fa-solid fa-plus text-xs"></i></button>
                    </div>
                `;
                list.appendChild(row);

                // 報表行
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><div class="cat-tag">${i.cat}</div><br><b>${i.name}</b></td>
                    <td align="center">${i.unit}</td>
                    <td align="center"><b>${i.qty}</b></td>
                    <td class="val-right">$${i.price.toLocaleString()}</td>
                    <td class="val-right">$${(i.price * i.qty).toLocaleString()}</td>
                    <td class="val-right" style="color:#B91C1C">$${Math.round(i.price * 1.3 * i.qty).toLocaleString()}</td>
                `;
                rBody.appendChild(tr);
            });

            document.getElementById('r-sum-b').innerText = `$${bt.toLocaleString()}`;
            document.getElementById('r-sum-r').innerText = `$${rt.toLocaleString()}`;
        }

        window.changeQty = (idx, d) => { basket[idx].qty = Math.max(0, basket[idx].qty + d); if(basket[idx].qty === 0) basket.splice(idx, 1); update(); }
        window.setQty = (idx, v) => { basket[idx].qty = Math.max(0, parseFloat(v) || 0); if(basket[idx].qty === 0) basket.splice(idx, 1); update(); }
        window.clearBasket = () => { if(confirm("確定清空已選的所有工項嗎？")) { basket = []; update(); } }

        window.onload = init;
    </script>
</body>
</html>
